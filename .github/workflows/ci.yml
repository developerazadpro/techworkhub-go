name: Go CI

on:
  push:
    branches: [ main, feature/** ]
    pull_request:
      branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Verify Dependencies
        run: go mod tidy

      - name: Run Tests
        run: go test ./... -v 